server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Static WebVOWL files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Fuseki SPARQL proxy — auth header injected here so OWL2VOWL never handles credentials.
    # Use http://server/fuseki/<dataset>/... as the IRI in WebVOWL.
    location /fuseki/ {
        proxy_pass ${FUSEKI_URL}/;
        proxy_set_header Authorization "${FUSEKI_AUTH_HEADER}";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # OWL2VOWL API endpoints — exact matches for clarity and auditability
    location = /serverTimeStamp {
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /convert {
        client_max_body_size 50m;
        proxy_read_timeout 300s;
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /read {
        proxy_read_timeout 300s;
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /directInput {
        client_max_body_size 50m;
        proxy_read_timeout 300s;
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /loadingStatus {
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /conversionDone {
        proxy_pass http://owl2vowl:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
